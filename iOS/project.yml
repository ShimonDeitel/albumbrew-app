name: Brewlog - Album Listening
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Brewlog-AlbumListening:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Brewlog-AlbumListening
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.albumlog
        DEVELOPMENT_TEAM: W7Q885Q59C
        MARKETING_VERSION: "1.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Brewlog-AlbumListening/Info.plist
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Brewlog-AlbumListening/Info.plist
      properties:
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
  Brewlog-AlbumListeningTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Brewlog-AlbumListeningTests
    dependencies:
      - target: Brewlog-AlbumListening
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
  Brewlog-AlbumListeningUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Brewlog-AlbumListeningUITests
    dependencies:
      - target: Brewlog-AlbumListening
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  Brewlog - Album Listening:
    build:
      targets:
        Brewlog-AlbumListening: all
    test:
      targets:
        - Brewlog-AlbumListeningTests
        - Brewlog-AlbumListeningUITests
    run:
      config: Debug
